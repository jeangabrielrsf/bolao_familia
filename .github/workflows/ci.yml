name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bolao
          POSTGRES_PASSWORD: bolao
          POSTGRES_DB: bolao_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bolao:bolao@localhost:5432/bolao_test
      ADMIN_PASSWORD: test-admin-password
      JWT_SECRET: test-jwt-secret-for-ci-only
      MICROSERVICE_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm test
      - run: npm run build
